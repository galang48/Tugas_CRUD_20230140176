<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Dashboard KTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        body{
        background:linear-gradient(135deg,#667eea,#764ba2);
        min-height:100vh;
        font-family: 'Segoe UI', sans-serif;
        }

        .container{
        margin-top:60px;
        }

        .card-glass{
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(15px);
        border-radius:15px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        padding:25px;
        color:white;
        }

        .title{
        font-weight:700;
        font-size:32px;
        text-align:center;
        margin-bottom:25px;
        }

        input,select{
        border-radius:10px!important;
        }

        .btn-modern{
        border-radius:10px;
        font-weight:600;
        }

        .table-modern{
        background:white;
        border-radius:10px;
        overflow:hidden;
        }

        .table-modern th{
        background:#1f2937;
        color:white;
        }

        .table-modern tr:hover{
        background:#f3f4f6;
        }

        .btn-edit{
        background:#f59e0b;
        border:none;
        }

        .btn-delete{
        background:#ef4444;
        border:none;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card-glass">

        <div class="title">
            Dashboard Data KTP
        </div>

        <input type="hidden" id="id">

        <div class="row g-3">

            <div class="col-md-4">
                <input class="form-control" id="nomorKtp" placeholder="Nomor KTP">
            </div>

            <div class="col-md-4">
                <input class="form-control" id="namaLengkap" placeholder="Nama Lengkap">
            </div>

            <div class="col-md-4">
                <input class="form-control" id="alamat" placeholder="Alamat">
            </div>

            <div class="col-md-4">
                <input type="date" class="form-control" id="tanggalLahir">
            </div>

            <div class="col-md-4">
                <select class="form-control" id="jenisKelamin">
                    <option>Laki-laki</option>
                    <option>Perempuan</option>
                </select>
            </div>

            <div class="col-md-4">
                <button class="btn btn-success btn-modern w-100" onclick="simpan()">
                    Simpan Data
                </button>
            </div>

        </div>

    </div>


    <div class="table-modern mt-4 p-3">

        <table class="table table-hover">

            <thead>

            <tr>

                <th>ID</th>
                <th>No KTP</th>
                <th>Nama</th>
                <th>Alamat</th>
                <th>Jenis Kelamin</th>
                <th>Aksi</th>

            </tr>

            </thead>

            <tbody id="dataKtp"></tbody>

        </table>

    </div>

</div>


<script>

    const api="http://localhost:8080/ktp"

    loadData()

    function loadData(){

    $.get(api,function(data){

    let rows=""

    data.forEach(d=>{

    rows+=`

    <tr>

    <td>${d.id}</td>
    <td>${d.nomorKtp}</td>
    <td>${d.namaLengkap}</td>
    <td>${d.alamat}</td>
    <td>${d.jenisKelamin}</td>

    <td>

    <button class="btn btn-edit btn-sm text-white" onclick="edit(${d.id})">
    Edit
    </button>

    <button class="btn btn-delete btn-sm text-white" onclick="hapus(${d.id})">
    Delete
    </button>

    </td>

    </tr>

    `

    })

    $("#dataKtp").html(rows)

    })

    }

    function simpan(){

    let id=$("#id").val()

    let data={

    nomorKtp:$("#nomorKtp").val(),
    namaLengkap:$("#namaLengkap").val(),
    alamat:$("#alamat").val(),
    tanggalLahir:$("#tanggalLahir").val(),
    jenisKelamin:$("#jenisKelamin").val()

    }

    if(id==""){

    $.ajax({

    url:api,
    method:"POST",
    contentType:"application/json",
    data:JSON.stringify(data),

    success:function(){

    Swal.fire("Berhasil","Data berhasil ditambahkan","success")

    resetForm()
    loadData()

    }

    })

    }else{

    $.ajax({

    url:api+"/"+id,
    method:"PUT",
    contentType:"application/json",
    data:JSON.stringify(data),

    success:function(){

    Swal.fire("Berhasil","Data berhasil diupdate","success")

    resetForm()
    loadData()

    }

    })

    }

    }

    function edit(id){

    $.get(api+"/"+id,function(data){

    $("#id").val(data.id)
    $("#nomorKtp").val(data.nomorKtp)
    $("#namaLengkap").val(data.namaLengkap)
    $("#alamat").val(data.alamat)
    $("#tanggalLahir").val(data.tanggalLahir.substring(0,10))
    $("#jenisKelamin").val(data.jenisKelamin)

    })

    }

    function hapus(id){

    Swal.fire({

    title:"Yakin hapus data?",
    icon:"warning",
    showCancelButton:true,
    confirmButtonText:"Hapus"

    }).then((result)=>{

    if(result.isConfirmed){

    $.ajax({

    url:api+"/"+id,
    method:"DELETE",

    success:function(){

    Swal.fire("Terhapus","Data berhasil dihapus","success")

    loadData()

    }

    })

    }

    })

    }

    function resetForm(){

    $("#id").val("")
    $("#nomorKtp").val("")
    $("#namaLengkap").val("")
    $("#alamat").val("")
    $("#tanggalLahir").val("")

    }

</script>

</body>

</html>
